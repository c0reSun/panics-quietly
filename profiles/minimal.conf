# profile: minimal — quiet, nothing scary. Only the essentials.
# format: indicator = on/off [params]  # explanation
# (`rule:` lines auto-switch profiles by context — see full.conf for examples)

glyphs = unicode            # unicode | ascii (ascii — if your terminal can't draw █▒░⏷Δ)

ctx    = on   width=12 tokens   # context: bar + used/limit (.11/1)
model  = on                     # which model is active
