# profile: full — everything. Pace forecast, projection zone, blocked-time delta.
# format: indicator = on/off [params]  # explanation

glyphs   = unicode

ctx      = on   width=12 tokens                        # context: bar + .11/1
limit_5h = on   width=12 marker projection delta reset # 5-hour: full forecast
limit_7d = on   width=12 marker projection delta reset # 7-day: full forecast
model    = on                                          # model
effort   = on                                          # effort level

# Limit-window params:
#   marker      | — where you'd be if you spent evenly over time (green/red)
#   projection  ▒ projected use within budget / ▓ red when you'll blow the limit
#   delta       Δ-time — how long you'd sit blocked (only when you're ahead)
#   reset       ⏷time — when the window resets

# --- rules: auto-switch profiles by context. First match wins, checked every render.
# Uncomment and edit; `dir` is a path-prefix match, `model` a substring of the model name.
# rule: dir=~/Projects/Nominal -> profile=full
# rule: model=haiku            -> profile=minimal
