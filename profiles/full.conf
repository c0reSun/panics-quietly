# profile: full — все. Прогноз темпу, зона-прогноз, час заблокований.
# формат: показник = on/off [параметри]  # пояснення

glyphs   = unicode

ctx      = on   width=12 tokens                       # контекст: бар + .11/1
limit_5h = on   width=12 marker projection delta reset # 5-год: повний прогноз
limit_7d = on   width=12 marker projection delta reset # 7-ден: повний прогноз
model    = on                                          # модель
effort   = on                                          # рівень зусиль

# Параметри вікон лімітів:
#   marker      | — де лінійно мав би бути за часом (зелений/червоний)
#   projection  ▒ прогноз у межах бюджету / ▓ червоний коли виб'єш межу
#   delta       Δ-час — скільки чекатимеш заблокований (тільки коли випереджаєш)
#   reset       ⏷час — коли вікно скинеться

# --- rules: ПОРОЖНЬО у v1, рушій ігнорує. Двері під автоматизацію v2 ---
# rule: dir=~/Projects/Nominal -> profile=full
# rule: model=haiku            -> profile=minimal
