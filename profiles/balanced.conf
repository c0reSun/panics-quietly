# profile: balanced — the newcomer default. Context + one limit window, no forecast.
# format: indicator = on/off [params]  # explanation

glyphs   = unicode

ctx      = on   width=12 tokens     # context: bar + .11/1
limit_5h = on   width=12 reset      # 5-hour plan window: bar + % + ⏷ reset time
model    = on                       # model

# No marker/projection/delta and no 7d — calm, no overload.
