# profile: balanced — дефолт новачку. Контекст + одне вікно лімітів, без прогнозу.
# формат: показник = on/off [параметри]  # пояснення

glyphs   = unicode

ctx      = on   width=12 tokens     # контекст: бар + .11/1
limit_5h = on   width=12 reset      # 5-год вікно плану: бар + % + ⏷ час скидання
model    = on                       # модель

# Без marker/projection/delta та без 7d — спокійно, без перевантаження.
